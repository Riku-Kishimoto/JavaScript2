<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //挨拶する関数+引数付きの宣言
        /* function greet(name) {
            //戻り値
            return `こんにちは、${name}さん`
            // return 'こんにちは' + name + 'さん';
        } */
        //function型の関数宣言は下に置けてしまう。(ホイスティング)
        //関数名()　は関数を実行

        //関数式で関数を定義
        //関数式は上にないと実行できない
        //プログラムの特性上そちらのほうが分かりやすい
        //近年では関数式を使うエンジニアが多い
        /* const greet = function (name) {
            return `こんにちは${name}さん`;
        } */

        //アロー関数
        //function()は() =>
        const greet = (name) => {
            return `こんにちは${name}さん`;
        };
        console.log(greet('大森'));


        //消費税を加えた金額返す関数の宣言+引数付き
        function calcTaxIncluded(price) {
            return Math.floor(price * 1.1);
        }

        //関数の実行がtotal(変数)に代入されています。
        const total = calcTaxIncluded(1200);
        console.log(total);
        // 1320

        //amazon Fire TV 4Kmax 12980円の3割引が分かる関数宣言して実行
        const bargain = (price) => {
            return Math.floor(price * 0.7);
        }

        const totalFire = bargain(12980);
        console.log(`amazon Fire TV 4Kmaxの3割引は${totalFire}円です。`);

        //中日と渡すと中日ドラゴンズと帰ってくる関数
        //変数に関数が入ると関数名
        const chunichi = (team) => {
            return `${team}ドラゴンズ`;
        }

        const dragons = chunichi('中日');
        console.log(dragons);


        //配列を取り込みます。
        //変数の中に配列が入ると、配列名
        const students = ['田中', '鈴木', '佐藤'];

        //forEachはfor文4つの中で最近よく出てくるやつ
        students.forEach(function (student) {
            console.log(student);
        });


        //map()
        //新しく配列ができる。勝手に要素数は判定してループして配列に挿入してくれる。
        const studentNames = students.map(function (name) {
            return name + 'さん';
        });

        //新しい配列studentNames
        console.log(studentNames);

        //古い配列studentsはそのまま残る
        console.log(students);

        //配列内filter()
        const scores = [40, 72, 90, 58];

        //自動的に要素数回ループします。
        const passedScores = scores.filter((score) => {
            return score >= 60;
        });

        //新しい配列を作って、条件にあるものだけを挿入
        console.log(passedScores);
        // [72, 90]

        const numbers = [1, 2, 3];

        // ここが「別の関数」
        // 1件分のデータを受け取って、変換した結果を返す
        function doubleNumber(number) {
            return number * 2;
        }

        // map() の中で、上で定義した doubleNumber() を使う
        const doubledNumbers = numbers.map(doubleNumber);

        console.log(doubledNumbers);
        // [2, 4, 6]
    </script>
</body>

</html>
